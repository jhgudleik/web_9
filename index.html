<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jQuery Практикум: Список задач</title>
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>jQuery Практикум: Список задач</h1>

  <div class="container">
    <h2>Добавить задачу</h2>
    <input type="text" class="task-input" placeholder="Введите задачу..." id="taskInput">
    <button class="btn btn-add" id="btnAdd">Добавить задачу</button>
  </div>

  <div class="container">
    <h2>Управление задачами</h2>
    <ul id="list"></ul>
  </div>

  <div class="container">
    <h2>Действия</h2>
    <ol id="actionButtons">
      <li><button class="btn btn-info" id="btnShowText">Показать текст активной</button></li>
      <li><button class="btn btn-info" id="btnSetHTML">Изменить HTML активной</button></li>
      <li><button class="btn btn-clear" id="btnClear">Очистить список</button></li>
      <li><button class="btn btn-css" id="btnSetCSS">Изменить стиль активной</button></li>
      <li><button class="btn btn-toggle" id="btnToggleClass">Переключить класс</button></li>
      <li><button class="btn btn-size" id="btnGetSize">Получить размеры</button></li>
      <li><button class="btn btn-size" id="btnGetPosition">Получить позицию</button></li>
      <li><button class="btn btn-delete" id="btnRemoveAttr">Удалить data-id</button></li>
      <li><button class="btn btn-add" id="btnOneTime">Один раз (сработает 1 раз)</button></li>
      <li><button class="btn btn-delete" id="btnOff">Отключить добавление</button></li>
    </ol>
  </div>
  <div class="container">
    <h2>Форма и события</h2>
    <form id="taskForm">
      <input type="text" name="task" placeholder="Введите через форму..." class="task-input">
      <button type="submit" class="btn btn-add">Отправить форму</button>
    </form>
  </div>

  <div class="container">
    <h2>Информация</h2>
    <div id="output">Ожидание действий...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
